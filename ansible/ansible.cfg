[defaults]
inventory           = inventory/hosts.ini
retry_files_enabled = False
stdout_callback     = yaml
roles_path          = /mnt/c/Users/trach/Documents/New project/devops_platform/ansible/roles
host_key_checking   = False
vault_password_file = ~/.vault_pass

# community.aws.aws_ssm connection — Ansible communicates via AWS SSM Run Command
# No SSH port (22) needed. No key pair needed.
# Requires: pip install boto3 botocore + community.aws collection installed locally
[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
