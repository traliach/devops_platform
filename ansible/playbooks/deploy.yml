---
# deploy.yml — deploy or update the Docker Compose platform stack
# Run this after provision.yml has completed successfully
# Also called by Jenkins when redeploying
#
# Usage:
#   ansible-playbook playbooks/deploy.yml

- name: Deploy platform stack
  hosts: platform
  become: true

  tasks:
    - name: Ensure /opt/platform directory exists
      file:
        path: /opt/platform
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0755"
      tags: [deploy]

    - name: Sync platform files to server
      copy:
        src: ../../platform/
        dest: /opt/platform/
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0644"
      tags: [deploy]

    - name: Write .env from vault vars
      copy:
        content: |
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
          JENKINS_ADMIN_PASSWORD={{ jenkins_admin_password }}
          GHCR_USERNAME={{ ghcr_username }}
          GHCR_TOKEN={{ ghcr_token }}
          APP_VERSION=latest
        dest: /opt/platform/.env
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0600"
      tags: [deploy]

    - name: Lock down .env permissions
      file:
        path: /opt/platform/.env
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0600"
      tags: [deploy]

    # Login to GHCR so EC2 can pull the manga-hub image once Jenkins has built it
    - name: Login to GHCR
      shell: |
        source /opt/platform/.env
        echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
      args:
        executable: /bin/bash
      no_log: true
      tags: [deploy]

    # --ignore-pull-failures: skip images that don't exist yet (e.g. manga-hub before first Jenkins build)
    - name: Pull latest images
      command: docker compose pull --ignore-pull-failures
      args:
        chdir: /opt/platform
      async: 300
      poll: 15
      tags: [deploy]

    # Start core services only — manga-hub is excluded until Jenkins builds the image
    # Once Jenkins has pushed ghcr.io/traliach/manga-hub, run make deploy again to start it
    - name: Build and start core stack
      command: docker compose up -d --remove-orphans --build jenkins prometheus grafana
      args:
        chdir: /opt/platform
      async: 600
      poll: 20
      tags: [deploy]
