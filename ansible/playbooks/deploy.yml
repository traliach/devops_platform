---
# deploy.yml — deploy or update the Docker Compose platform stack
# Run this after provision.yml has completed successfully
# Also called by Jenkins when redeploying
#
# Usage:
#   ansible-playbook playbooks/deploy.yml

- name: Deploy platform stack
  hosts: platform
  become: true

  tasks:
    - name: Ensure /opt/platform directory exists
      file:
        path: /opt/platform
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0755"
      tags: [deploy]

    - name: Sync platform files to server
      copy:
        src: ../../platform/
        dest: /opt/platform/
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0644"
      tags: [deploy]

    - name: Lock down .env permissions
      file:
        path: /opt/platform/.env
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0600"
      tags: [deploy]

    - name: Pull latest images
      command: docker compose pull
      args:
        chdir: /opt/platform
      async: 300
      poll: 15
      tags: [deploy]

    # async/poll required: building Jenkins image takes 3-5 min — SSM times out on blocking commands
    - name: Build and start stack
      command: docker compose up -d --remove-orphans --build
      args:
        chdir: /opt/platform
      async: 600
      poll: 20
      tags: [deploy]
