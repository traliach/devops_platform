---
# docker role — installs Docker CE + Compose plugin from the official Docker repo
# Uses official Docker CE repo (not the AL2023 bundled docker package)
# which gives us the latest stable release and the Compose v2 plugin
# Idempotent: safe to run multiple times

# Remove the Docker CE RHEL repo if it was added by a previous run — it is
# incompatible with AL2023 and breaks dnf metadata for all packages
- name: Remove incompatible Docker CE repo if present
  file:
    path: /etc/yum.repos.d/docker-ce.repo
    state: absent
  tags: [docker, install]

# Amazon Linux 2023 is Fedora-based, NOT RHEL-compatible for Docker CE repos.
# The correct approach is Amazon's own Docker package — maintained, tested on AL2023.
# docker-compose-plugin is installed separately as a binary since it's not in Amazon repos.
- name: Install Docker from Amazon Linux repos
  dnf:
    name:
      - docker
    state: present
  notify: restart docker
  tags: [docker, install]

- name: Install Docker Compose plugin binary
  get_url:
    url: "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64"
    dest: /usr/libexec/docker/cli-plugins/docker-compose
    mode: "0755"
  tags: [docker, install]

# docker-compose >= v2.29 requires buildx >= 0.17.0.
# The buildx bundled with Amazon's docker package is too old.
# Install the latest buildx plugin from GitHub releases.
- name: Install Docker buildx plugin (latest)
  shell: |
    set -e
    VERSION=$(curl -sf "https://api.github.com/repos/docker/buildx/releases/latest" \
      | grep '"tag_name"' | cut -d'"' -f4)
    curl -sfL "https://github.com/docker/buildx/releases/download/${VERSION}/buildx-${VERSION}.linux-amd64" \
      -o /usr/libexec/docker/cli-plugins/docker-buildx
    chmod +x /usr/libexec/docker/cli-plugins/docker-buildx
  tags: [docker, install]

- name: Enable and start Docker service
  systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true
  tags: [docker, service]

- name: Configure Docker daemon (log rotation + storage driver + DNS)
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "storage-driver": "overlay2",
        "dns": ["8.8.8.8", "8.8.4.4"]
      }
    mode: "0644"
  notify: restart docker
  tags: [docker, configure]

- name: Add users to docker group
  user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  tags: [docker, configure]
