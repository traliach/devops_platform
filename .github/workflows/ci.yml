name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Terraform validate ────────────────────────────────────────────────────────
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: terraform init (local backend — no S3 needed for validation)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: terraform fmt check
        run: terraform fmt -check -recursive

  # ── Ansible lint ─────────────────────────────────────────────────────────────
  ansible:
    name: Ansible lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Lint playbooks
        run: ansible-lint ansible/playbooks/
        continue-on-error: true

  # ── Docker build (Jenkins image) ─────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Jenkins image (no push)
        uses: docker/build-push-action@v5
        with:
          context: platform/jenkins
          push: false
          tags: platform-jenkins:ci

  # ── Shell script lint ─────────────────────────────────────────────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on all scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
