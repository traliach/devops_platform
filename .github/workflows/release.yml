name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build, push, and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push manga-hub image
        uses: docker/build-push-action@v5
        with:
          context: app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/manga-hub:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/manga-hub:latest

      - name: Build and push Jenkins platform image
        uses: docker/build-push-action@v5
        with:
          context: platform/jenkins
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/platform-jenkins:${{ steps.meta.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/platform-jenkins:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```
            ghcr.io/traliach/manga-hub:${{ steps.meta.outputs.VERSION }}
            ghcr.io/traliach/platform-jenkins:${{ steps.meta.outputs.VERSION }}
            ```

            ## Deploy

            Pull the latest platform files and redeploy:
            ```bash
            cd ~/devops-platform-lab && make deploy
            ```
