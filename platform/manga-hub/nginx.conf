server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — all routes fall back to index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint — used by Docker Compose healthcheck and load balancers
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Static asset caching — Vite generates hashed filenames so cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
