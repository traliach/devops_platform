---
# platform/docker-compose.yml
# Runs the full devops-platform-lab stack:
#   Jenkins LTS → CI/CD for the Flask app
#   Prometheus   → scrapes Jenkins + Flask app + node_exporter metrics
#   Grafana      → dashboards fed by Prometheus
#   Flask app    → sample Python app being built and deployed by Jenkins
#
# All images pinned — never use latest
# All services have health checks, resource limits, named volumes, restart policy
# Secrets come from .env file (gitignored) — never hardcoded here

services:

  # ── Jenkins ──────────────────────────────────────────────────────────────────
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    mem_limit: 1024m
    cpus: "1.0"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx768m
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/casc:/var/jenkins_home/casc:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - platform
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      - "8080:8080"

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - platform
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Prometheus is internal only — not exposed to host
    expose:
      - "9090"

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - platform
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    ports:
      - "3000:3000"

  # ── Flask app ─────────────────────────────────────────────────────────────────
  flask-app:
    image: ghcr.io/${GHCR_USERNAME}/flask-app:${FLASK_APP_VERSION:-latest}
    container_name: flask-app
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.25"
    environment:
      - FLASK_ENV=production
    networks:
      - platform
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Flask app is internal only — Prometheus scrapes it, not exposed to host
    expose:
      - "5000"

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  jenkins_home:
    name: jenkins_home
  prometheus_data:
    name: prometheus_data
  grafana_data:
    name: grafana_data

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  platform:
    name: platform
    driver: bridge
