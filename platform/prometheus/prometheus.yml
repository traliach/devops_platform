global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Jenkins metrics — exposed by the Prometheus plugin at /prometheus
  - job_name: jenkins
    metrics_path: /prometheus
    static_configs:
      - targets: ["jenkins:8080"]

  # Flask app metrics — exposed by prometheus_flask_exporter at /metrics
  - job_name: flask-app
    metrics_path: /metrics
    static_configs:
      - targets: ["flask-app:5000"]

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
