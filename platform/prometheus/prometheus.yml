global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Jenkins metrics — exposed by the Prometheus plugin at /prometheus
  - job_name: jenkins
    metrics_path: /prometheus
    static_configs:
      - targets: ["jenkins:8080"]

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Note: manga-hub is a static React app (Nginx) — no /metrics endpoint.
  # Application metrics are not available. Pipeline metrics come from Jenkins above.
