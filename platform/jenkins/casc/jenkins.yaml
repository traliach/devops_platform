# Jenkins Configuration as Code (JCasC)
# Everything configured here — nothing done manually through the UI
# Applied automatically on Jenkins startup via CASC_JENKINS_CONFIG env var

jenkins:
  systemMessage: "devops-platform-lab | Managed by JCasC — do not configure via UI"
  # 0 executors on controller — builds run on agents, not the controller node
  # Keeps the controller stable and responsive (Jenkins best practice)
  numExecutors: 0
  mode: NORMAL
  scmCheckoutRetryCount: 2

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"

  globalNodeProperties:
    - envVars:
        env:
          - key: DEPLOY_USER
            value: deploy
          - key: PLATFORM_DIR
            value: /opt/platform

unclassified:
  location:
    url: "http://54.159.150.73:8080/"

  # Prometheus metrics endpoint — scraped by Prometheus container
  prometheusConfiguration:
    collectingMetricsPeriodInSeconds: 15
    countSuccessfulBuilds: true
    countFailedBuilds: true
    countNotBuiltBuilds: true
    countAbortedBuilds: true
    fetchTestResults: true

  # GitHub integration
  gitHubPluginConfig:
    configs:
      - name: "GitHub"
        apiUrl: "https://api.github.com"

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "ghcr-credentials"
              description: "GHCR credentials for pushing manga-hub image"
              username: "${GHCR_USERNAME}"
              password: "${GHCR_TOKEN}"

# NOTE: manga-hub pipeline job is created manually via Jenkins UI after first boot
# The jobs: block requires job-dsl plugin which is not installed
# To add job-dsl support later, add 'job-dsl' to plugins.txt and restore the jobs: block